<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <script>
        const CONFIG = {
            // 使用 Vercel 的永久生产域名
            BACKEND_URL: 'https://money-manager1.vercel.app/api',
            TABLES: {
                USER: 'tblSKgu3DkAo8X5g',
                BALANCE: 'tbl8oK0Zl6TzsAE6',
                HISTORY: 'tblQsicFFJUZVAQR'
            }
        };
        
        let currentUser = null;

        // 统一查询接口
        async function apiRequest(tableId, filter) {
            try {
                const response = await fetch(`${CONFIG.BACKEND_URL}/query-bitable`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tableId, filter })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`服务器状态: ${response.status}`);
                }
                
                const data = await response.json();
                return data.data?.items || [];
            } catch (error) {
                console.error('请求详细错误:', error);
                throw error;
            }
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('loginMsg');
            const spinner = document.getElementById('loginSpinner');

            if (!u || !p) { msg.innerText = '请输入账号密码'; msg.classList.remove('hidden'); return; }
            
            // UI 状态切换
            btn.disabled = true;
            spinner.classList.remove('hidden');
            msg.innerText = '正在验证安全连接...';
            msg.classList.remove('hidden');

            try {
                const filter = `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"`;
                const users = await apiRequest(CONFIG.TABLES.USER, filter);
                
                if (users.length > 0) {
                    currentUser = users[0].fields;
                    showDashboard();
                } else {
                    msg.innerText = '账号或密码不正确';
                }
            } catch (error) {
                msg.innerText = '连接失败: ' + error.message + ' (请检查后端部署或域名白名单)';
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('displayName').innerText = currentUser['客户名称'];
            refreshData();
        }

        async function refreshData() {
            try {
                const id = currentUser['客户ID'];
                const balances = await apiRequest(CONFIG.TABLES.BALANCE, `CurrentValue.[客户ID] == "${id}"`);
                if (balances.length > 0) {
                    const b = balances[0].fields;
                    document.getElementById('bal_huokuan').innerText = '¥' + (b['货款账户余额'] || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2});
                    document.getElementById('bal_fanli').innerText = '¥' + (b['返利账户余额'] || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2});
                }
            } catch (e) {
                console.error('数据刷新失败', e);
            }
        }
    </script>

    <div id="loginSection" class="flex items-center justify-center h-screen fade-in">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm mx-4 border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">经销商资金管理</h1>
                <p class="text-gray-400 text-sm mt-2">请输入您的授权账号访问</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="账号" class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="password" id="password" placeholder="密码" class="w-full p-4 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition-all flex justify-center items-center shadow-lg shadow-blue-100">
                    <span>立即登录</span>
                    <div id="loginSpinner" class="hidden loading-spinner ml-3" style="width:18px; height:18px; border-width:2px;"></div>
                </button>
            </div>
            <p id="loginMsg" class="mt-6 text-center text-red-500 text-xs font-medium hidden bg-red-50 p-3 rounded-lg"></p>
        </div>
    </div>

    <div id="mainSection" class="hidden container mx-auto p-6 max-w-2xl pt-12 fade-in">
        <div class="flex justify-between items-center mb-10">
            <div>
                <p class="text-gray-400 text-sm">欢迎回来</p>
                <h2 class="text-2xl font-bold text-gray-800"><span id="displayName">--</span></h2>
            </div>
            <button onclick="location.reload()" class="bg-white text-gray-500 text-xs px-4 py-2 rounded-full shadow-sm border border-gray-100 hover:bg-gray-50">退出系统</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 p-8 rounded-3xl text-white shadow-xl shadow-blue-100">
                <div class="flex items-center mb-4">
                    <span class="bg-white/20 p-2 rounded-lg mr-3 text-xs">货款</span>
                </div>
                <p class="text-xs opacity-70 mb-1">当前账户余额</p>
                <p class="text-3xl font-bold tracking-tight" id="bal_huokuan">¥0.00</p>
            </div>
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 p-8 rounded-3xl text-white shadow-xl shadow-emerald-100">
                <div class="flex items-center mb-4">
                    <span class="bg-white/20 p-2 rounded-lg mr-3 text-xs">返利</span>
                </div>
                <p class="text-xs opacity-70 mb-1">当前可用返利</p>
                <p class="text-3xl font-bold tracking-tight" id="bal_fanli">¥0.00</p>
            </div>
        </div>

        <div class="mt-12 text-center">
            <div class="inline-block p-1 px-4 bg-gray-100 rounded-full text-[10px] text-gray-400 uppercase tracking-widest">
                System Connected to Feishu Bitable
            </div>
        </div>
    </div>
</body>
</html>

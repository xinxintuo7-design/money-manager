<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-shadow { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl card-shadow p-8">
            <div class="text-center mb-8">
                <div class="gradient-bg w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-university text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">经销商资金管理系统</h1>
                <p class="text-gray-500 mt-2">管理经销商资金流水，高效便捷</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user-circle mr-1"></i> 账号
                    </label>
                    <input type="text" id="username" placeholder="请输入手机号/账号" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-key mr-1"></i> 密码
                    </label>
                    <input type="password" id="password" placeholder="请输入登录密码" 
                           class="w-util px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                </div>
                <button type="submit" id="loginBtn" class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-all flex items-center justify-center">
                    <span id="btnText">登录系统</span>
                    <div id="loadingSpinner" class="hidden ml-2 loading"></div>
                </button>
            </form>

            <div id="loginMsg" class="mt-6 p-4 rounded-lg hidden text-sm text-center font-medium border"></div>

            <div class="mt-6 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                <p class="text-xs font-bold text-indigo-800 mb-1">测试账号</p>
                <div class="flex justify-between text-xs text-indigo-600">
                    <span>账号: 17793485311</span>
                    <span>密码: 123456</span>
                </div>
            </div>
        </div>

        <div id="debugBox" class="mt-6 p-4 bg-gray-900 rounded-lg text-[10px] text-green-400 font-mono overflow-auto max-h-40 shadow-inner">
            <p class="text-gray-500 border-b border-gray-800 mb-2 pb-1">系统调试日志 (仅开发可见)</p>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        // 配置信息：已对接你成功的 Vercel 后端
        const CONFIG = {
            API_URL: 'https://money-manager-backend-rosy.vercel.app/api/query-bitable',
            TABLE_ID: 'tblSKgu3DkAo8X5g'
        };

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginMsg = document.getElementById('loginMsg');
        const debugContent = document.getElementById('debugContent');

        // 调试日志函数
        function addLog(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = isError ? 'text-red-400' : 'text-green-400';
            logItem.textContent = `[${time}] ${msg}`;
            debugContent.appendChild(logItem);
            debugContent.parentElement.scrollTop = debugContent.parentElement.scrollHeight;
        }

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            
            // 恢复/清空状态
            loginBtn.disabled = true;
            document.getElementById('btnText').textContent = '正在验证身份...';
            document.getElementById('loadingSpinner').classList.remove('hidden');
            loginMsg.classList.add('hidden');

            const payload = {
                tableId: CONFIG.TABLE_ID,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            addLog(`请求发起: ${CONFIG.API_URL}`);

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                addLog(`服务器响应: ${JSON.stringify(result)}`);

                if (result.code === 0 && result.data?.items?.length > 0) {
                    // 登录成功
                    loginMsg.className = "mt-6 p-4 rounded-lg bg-green-50 text-green-700 border-green-200 text-center block";
                    loginMsg.innerHTML = '<i class="fas fa-check-circle mr-1"></i> 登录成功！正在进入系统...';
                    // 这里可以添加跳转逻辑，例如：window.location.href = 'dashboard.html';
                } else {
                    // 账号或密码错
                    loginMsg.className = "mt-6 p-4 rounded-lg bg-red-50 text-red-700 border-red-200 text-center block";
                    loginMsg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> 账号或密码不正确';
                }
            } catch (error) {
                addLog(`异常错误: ${error.message}`, true);
                loginMsg.className = "mt-6 p-4 rounded-lg bg-orange-50 text-orange-700 border-orange-200 text-center block";
                loginMsg.innerHTML = '<i class="fas fa-wifi-slash mr-1"></i> 网络连接异常，请重试';
            } finally {
                loginBtn.disabled = false;
                document.getElementById('btnText').textContent = '登录系统';
                document.getElementById('loadingSpinner').classList.add('hidden');
            }
        };
    </script>
</body>
</html>

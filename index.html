<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
        <h1 class="text-xl font-bold text-center mb-6">经销商系统登录</h1>
        <input type="text" id="username" placeholder="账号" class="w-full p-3 border rounded-lg mb-4 outline-none">
        <input type="password" id="password" placeholder="密码" class="w-full p-3 border rounded-lg mb-6 outline-none">
        <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition-all">登录系统</button>
        <p id="loginMsg" class="mt-4 text-center text-sm text-red-500"></p>
    </div>

    <script>
        const CONFIG = {
            // 使用你的永久域名
            BACKEND_URL: 'https://money-manager1.vercel.app/api/query-bitable',
            TABLES: { USER: 'tblSKgu3DkAo8X5g' }
        };

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');
            const btn = document.getElementById('loginBtn');

            if (!u || !p) { msg.innerText = '请输入账号密码'; return; }
            
            btn.disabled = true;
            msg.innerText = '正在建立安全连接...';

            try {
                const response = await fetch(CONFIG.BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: CONFIG.TABLES.USER, 
                        filter: `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"` 
                    })
                });

                const data = await response.json();
                if (data.data?.items?.length > 0) {
                    msg.style.color = 'green';
                    msg.innerText = '验证成功！欢迎使用。';
                } else {
                    msg.innerText = '账号或密码错误';
                }
            } catch (error) {
                msg.innerText = '连接服务器失败，请检查网络或后端状态';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 备用样式：万一 CDN 加载失败，确保界面依然整洁 */
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; }
        .btn-primary { background: #4f46e5; color: white; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 600; width: 100%; }
        .balance-card { border-top: 4px solid #4f46e5; transition: transform 0.2s; }
        .balance-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-indigo-600">经销商资金管理系统</h1>
                <p class="text-slate-400 mt-2">请验证您的身份</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">账号</label>
                    <input type="text" id="username" placeholder="请输入账号" class="w-full px-4 py-3 rounded-xl border focus:border-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" class="w-full px-4 py-3 rounded-xl border focus:border-indigo-500 outline-none" required>
                </div>
                <button type="submit" id="loginBtn" class="btn-primary">进入系统</button>
            </form>
            <div id="loginMsg" class="mt-4 text-center text-red-500 hidden"></div>
        </div>
    </div>

    <div id="dashboardPage" class="hidden max-w-5xl mx-auto p-4 py-8">
        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm">
            <div>
                <h2 class="text-xl font-bold">您好，<span id="displayName" class="text-indigo-600">--</span></h2>
                <p class="text-xs text-slate-400">数据同步自：飞书多维表</p>
            </div>
            <button onclick="location.reload()" class="text-sm px-4 py-2 border rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors">安全退出</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card balance-card border-blue-500">
                <p class="text-slate-500 text-sm italic">货款账户余额</p>
                <p class="text-2xl font-black mt-2 text-blue-600">¥ <span id="paymentBalance">0.00</span></p>
            </div>
            <div class="card balance-card border-green-500">
                <p class="text-slate-500 text-sm italic">返利账户余额</p>
                <p class="text-2xl font-black mt-2 text-green-600">¥ <span id="rebateBalance">0.00</span></p>
            </div>
            <div class="card balance-card border-indigo-600">
                <p class="text-slate-500 text-sm italic">核销账户总余额 (金额)</p>
                <p class="text-2xl font-black mt-2 text-indigo-600">¥ <span id="totalBalance">0.00</span></p>
            </div>
        </div>

        <div class="card">
            <h3 class="font-bold mb-4 border-b pb-2">近期变动明细 (待对接明细表)</h3>
            <div class="text-center py-8 text-slate-300">
                <p class="text-sm">关联表：经销商账户变动明细</p>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_URL: 'https://money-manager1.vercel.app/api/index',
            TABLE_ID: 'tblSKgu3DkAo8X5g' // 客户档案 ID
        };

        const loginForm = document.getElementById('loginForm');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('loginMsg');
            btn.innerText = "正在同步飞书数据...";
            btn.disabled = true;

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const res = await response.json();

                if (res.code === 0) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('dashboardPage').classList.remove('hidden');
                    // 渲染对应维度数据
                    document.getElementById('displayName').textContent = res.data.name;
                    document.getElementById('paymentBalance').textContent = Number(res.data.payment).toLocaleString();
                    document.getElementById('rebateBalance').textContent = Number(res.data.rebate).toLocaleString();
                    document.getElementById('totalBalance').textContent = Number(res.data.total).toLocaleString();
                } else {
                    msg.textContent = "❌ " + (res.msg || "登录验证失败");
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.textContent = "⚠️ 服务器响应超时，请刷新重试";
                msg.classList.remove('hidden');
            } finally {
                btn.innerText = "进入系统";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商管理系统 - 增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .debug-panel { background: #1e293b; color: #34d399; font-family: monospace; font-size: 12px; }
        .fund-card { border-radius: 1rem; padding: 1.5rem; background: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-top: 4px solid #6366f1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 border">
            <div class="text-center mb-6">
                <i class="fas fa-university text-indigo-600 text-4xl mb-4"></i>
                <h1 class="text-2xl font-bold text-slate-800">经销商资金管理系统</h1>
                <p class="text-slate-400 text-sm mt-2">管理经销商资金流水，高效便捷</p>
            </div>

            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-slate-400"></i>
                    <input type="text" id="username" placeholder="请输入账号" class="w-full pl-12 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" value="17793485311">
                </div>

                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
                    <input type="password" id="password" placeholder="请输入密码" class="w-full pl-12 pr-12 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400" value="123456">
                    <button onclick="togglePassword()" class="absolute right-4 top-4 text-slate-400 hover:text-indigo-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>

                <button onclick="doLogin()" id="loginBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    登录系统
                </button>

                <div id="statusBox" class="hidden p-3 rounded-lg text-center text-sm font-medium"></div>
            </div>

            <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <p class="text-xs text-blue-600 font-bold mb-1">测试账号信息</p>
                <p class="text-xs text-blue-500">账号：17793485311 | 密码：123456</p>
            </div>
        </div>

        <div class="w-full max-w-md mt-6 rounded-xl overflow-hidden shadow-lg border border-slate-700">
            <div class="bg-slate-800 px-4 py-2 text-slate-400 text-xs font-bold border-b border-slate-700">调试日志</div>
            <div id="debugLog" class="debug-panel h-32 p-4 overflow-y-auto leading-relaxed text-[10px]">
                [00:00:00] 系统准备就绪，等待登录...
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="hidden max-w-5xl mx-auto p-6 animate-fade-in">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">您好，<span id="displayName" class="text-indigo-600">--</span></h2>
                <p class="text-slate-400 text-xs mt-1">飞书多维表数据实时同步中</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-red-50 hover:text-red-500 transition-all">
                <i class="fas fa-sign-out-alt mr-1"></i> 安全退出
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="fund-card border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">货款账户余额</p>
                <h3 class="text-3xl font-black mt-2 text-slate-800">¥ <span id="val_payment">0.00</span></h3>
            </div>
            <div class="fund-card border-green-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">返利账户余额</p>
                <h3 class="text-3xl font-black mt-2 text-slate-800">¥ <span id="val_rebate">0.00</span></h3>
            </div>
            <div class="fund-card border-indigo-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">核销账户总额</p>
                <h3 class="text-3xl font-black mt-2 text-slate-800">¥ <span id="val_total">0.00</span></h3>
            </div>
        </div>
    </div>

    <script>
        // 1. 密码查验开关
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 2. 日志记录器
        function addLog(msg, type = 'info') {
            const logBox = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#f87171' : (type === 'success' ? '#34d399' : '#60a5fa');
            logBox.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 3. 登录逻辑
        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('statusBox');

            // 初始化状态
            btn.disabled = true;
            status.className = "p-3 rounded-lg text-center text-sm font-medium mt-4 block bg-blue-50 text-blue-600 border border-blue-100";
            status.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 正在连接云端服务器...';
            addLog(`发起请求: 账号=${u}`);

            try {
                const response = await fetch('https://money-manager1.vercel.app/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const res = await response.json();
                addLog(`服务器响应: ${JSON.stringify(res)}`);

                if (res.code === 0) {
                    status.className = "p-3 rounded-lg text-center text-sm font-medium mt-4 block bg-green-50 text-green-600 border border-green-100";
                    status.innerHTML = '<i class="fas fa-check-circle mr-2"></i> 登录成功！正在进入系统...';
                    addLog('身份验证通过，正在拉取余额...', 'success');

                    setTimeout(() => {
                        document.getElementById('loginPage').classList.add('hidden');
                        document.getElementById('dashboardPage').classList.remove('hidden');
                        // 渲染数据
                        document.getElementById('displayName').innerText = res.data.name;
                        document.getElementById('val_payment').innerText = Number(res.data.funds.payment).toLocaleString();
                        document.getElementById('val_rebate').innerText = Number(res.data.funds.rebate).toLocaleString();
                        document.getElementById('val_total').innerText = Number(res.data.funds.total).toLocaleString();
                    }, 1000);
                } else {
                    status.className = "p-3 rounded-lg text-center text-sm font-medium mt-4 block bg-red-50 text-red-600 border border-red-100";
                    status.innerHTML = '❌ 账号密码不匹配';
                    addLog('登录失败：' + res.msg, 'error');
                }
            } catch (err) {
                status.className = "p-3 rounded-lg text-center text-sm font-medium mt-4 block bg-orange-50 text-orange-600 border border-orange-100";
                status.innerHTML = '⚠️ 网络连接异常';
                addLog('请求崩溃：' + err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

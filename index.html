<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <script>
        const CONFIG = {
            // 确保这里包含 /api
            BACKEND_URL: 'https://money-manager1-3mf5khru2-xinxintuo7-6954s-projects.vercel.app/api',
            TABLES: {
                USER: 'tblSKgu3DkAo8X5g',
                BALANCE: 'tbl8oK0Zl6TzsAE6',
                HISTORY: 'tblQsicFFJUZVAQR'
            }
        };
        
        let currentUser = null;

        // 统一的查询函数
        async function apiRequest(tableId, filter) {
            const response = await fetch(`${CONFIG.BACKEND_URL}/query-bitable`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId, filter })
            });
            if (!response.ok) throw new Error('网络请求失败，请检查后端');
            const data = await response.json();
            return data.data?.items || [];
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');

            if (!u || !p) { alert('请输入账号密码'); return; }
            msg.innerText = "验证中...";

            try {
                // 通过后端查询用户信息
                const users = await apiRequest(CONFIG.TABLES.USER, `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"`);
                if (users.length > 0) {
                    currentUser = users[0].fields;
                    showDashboard();
                } else {
                    msg.innerText = "账号或密码错误";
                }
            } catch (e) {
                msg.innerText = "登录异常: " + e.message;
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('displayName').innerText = currentUser['客户名称'];
            refreshData();
        }

        async function refreshData() {
            const id = currentUser['客户ID'];
            const balances = await apiRequest(CONFIG.TABLES.BALANCE, `CurrentValue.[客户ID] == "${id}"`);
            if (balances.length > 0) {
                document.getElementById('bal_huokuan').innerText = '¥' + (balances[0].fields['货款账户余额'] || 0);
                document.getElementById('bal_fanli').innerText = '¥' + (balances[0].fields['返利账户余额'] || 0);
            }
        }
    </script>

    <div id="loginSection" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-80">
            <h1 class="text-xl font-bold text-center mb-6">经销商登录</h1>
            <input type="text" id="username" placeholder="账号" class="w-full p-2 border mb-4 rounded">
            <input type="password" id="password" placeholder="密码" class="w-full p-2 border mb-6 rounded">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">立即登录</button>
            <p id="loginMsg" class="text-red-500 text-sm mt-4 text-center"></p>
        </div>
    </div>

    <div id="mainSection" class="hidden p-6 max-w-md mx-auto">
        <h2 class="text-lg mb-6">欢迎，<span id="displayName" class="font-bold"></span></h2>
        <div class="space-y-4">
            <div class="bg-blue-600 p-4 rounded-xl text-white">
                <p class="text-sm opacity-80">货款余额</p>
                <p id="bal_huokuan" class="text-2xl font-bold">¥0.00</p>
            </div>
            <div class="bg-green-600 p-4 rounded-xl text-white">
                <p class="text-sm opacity-80">返利余额</p>
                <p id="bal_fanli" class="text-2xl font-bold">¥0.00</p>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
        <h1 class="text-xl font-bold text-center mb-6 text-blue-600">经销商系统登录</h1>
        <input type="text" id="username" placeholder="账号" class="w-full p-3 border rounded-lg mb-4 outline-none">
        <input type="password" id="password" placeholder="密码" class="w-full p-3 border rounded-lg mb-6 outline-none">
        <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-lg">登录</button>
        <p id="loginMsg" class="mt-4 text-center text-sm text-red-500"></p>
    </div>

    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');
            const btn = document.getElementById('loginBtn');

            if (!u || !p) { msg.innerText = '请输入账号密码'; return; }
            
            btn.disabled = true;
            msg.innerText = '正在连接服务器...';

            try {
                // 注意：这里必须是 /api/query-bitable
                const response = await fetch('https://money-manager1.vercel.app/api/query-bitable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: 'tblSKgu3DkAo8X5g', 
                        filter: `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"` 
                    })
                });

                if (!response.ok) throw new Error('后端没响应');

                const data = await response.json();
                if (data.data?.items?.length > 0) {
                    msg.style.color = 'green';
                    msg.innerText = '登录成功！';
                    // 登录成功后的动作写在这里
                } else {
                    msg.innerText = '账号或密码错误';
                }
            } catch (error) {
                msg.innerText = '连接服务器失败，请确保后端已变绿';
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

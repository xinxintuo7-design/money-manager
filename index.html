<div id="dashboardPage" class="hidden max-w-5xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold">您好，<span id="displayName" class="text-indigo-600">--</span></h2>
        <button onclick="location.reload()" class="text-sm text-slate-400 hover:text-red-500">安全退出</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-500">
            <p class="text-slate-500 text-sm">货款账户余额</p>
            <p class="text-2xl font-black mt-2">¥ <span id="paymentBalance">0.00</span></p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-500">
            <p class="text-slate-500 text-sm">返利账户余额</p>
            <p class="text-2xl font-black mt-2">¥ <span id="rebateBalance">0.00</span></p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
            <p class="text-slate-500 text-sm">核销账户总余额</p>
            <p class="text-2xl font-black mt-2">¥ <span id="totalBalance">0.00</span></p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold"><i class="fas fa-history mr-2"></i>近期出入账明细</h3>
            <button class="text-indigo-600 text-sm font-medium">查看全部</button>
        </div>
        <div class="text-center py-10 text-slate-300">
            <i class="fas fa-folder-open text-4xl mb-3"></i>
            <p>暂无明细数据 (对应表: 经销商账户变动明细)</p>
        </div>
    </div>
</div>

<script>
    // 在 fetch 成功的逻辑里添加：
    if (res.code === 0) {
        document.getElementById('displayName').textContent = res.data.name;
        document.getElementById('paymentBalance').textContent = res.data.payment.toLocaleString();
        document.getElementById('rebateBalance').textContent = res.data.rebate.toLocaleString();
        document.getElementById('totalBalance').textContent = res.data.total.toLocaleString();
    }
</script>

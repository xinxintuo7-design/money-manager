<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <script>
        const CONFIG = {
            // 修正：后端地址最后不要加 /api，我们在 apiRequest 里手动加
            BACKEND_URL: 'https://money-manager1.vercel.app',
            TABLES: {
                USER: 'tblSKgu3DkAo8X5g',
                BALANCE: 'tbl8oK0Zl6TzsAE6'
            }
        };

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');

            if (!u || !p) { msg.innerText = '请输入账号密码'; return; }
            msg.innerText = '连接中...';

            try {
                // 这里手动拼接 /api/query-bitable
                const response = await fetch(`${CONFIG.BACKEND_URL}/api/query-bitable`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: CONFIG.TABLES.USER, 
                        filter: `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"` 
                    })
                });

                const data = await response.json();
                
                if (data.data?.items?.length > 0) {
                    const user = data.data.items[0].fields;
                    msg.style.color = 'green';
                    msg.innerText = `欢迎，${user['客户名称']}！正在加载余额...`;
                    // 登录成功后的跳转逻辑可以在此继续
                } else {
                    msg.style.color = 'red';
                    msg.innerText = '账号或密码不正确';
                }
            } catch (error) {
                msg.style.color = 'red';
                msg.innerText = '连接失败: 服务器未响应，请检查 Vercel 状态';
            }
        }
    </script>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
        <h1 class="text-xl font-bold text-center mb-6">经销商系统登录</h1>
        <input type="text" id="username" placeholder="账号" class="w-full p-3 border rounded-lg mb-4 outline-none">
        <input type="password" id="password" placeholder="密码" class="w-full p-3 border rounded-lg mb-6 outline-none">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">登录</button>
        <p id="loginMsg" class="mt-4 text-center text-sm text-gray-500"></p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经销商资金管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <script>
        const CONFIG = {
            // 这里必须指向你的 Vercel 后端地址，末尾带 /api
            BACKEND_URL: 'https://money-manager1-3mf5khru2-xinxintuo7-6954s-projects.vercel.app/api',
            TABLES: {
                USER: 'tblSKgu3DkAo8X5g',
                BALANCE: 'tbl8oK0Zl6TzsAE6',
                HISTORY: 'tblQsicFFJUZVAQR'
            }
        };
        
        let currentUser = null;

        // 统一查询接口：现在直接发给你的 Vercel 后端
        async function apiRequest(tableId, filter) {
            const response = await fetch(`${CONFIG.BACKEND_URL}/query-bitable`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId, filter })
            });
            if (!response.ok) throw new Error('后端响应异常');
            const data = await response.json();
            return data.data?.items || [];
        }

        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('loginMsg');

            if (!u || !p) { msg.innerText = '请输入账号密码'; return; }
            
            btn.disabled = true;
            msg.innerText = '正在安全验证...';

            try {
                // 向后端查询用户信息
                const filter = `CurrentValue.[账号] == "${u}" && CurrentValue.[密码] == "${p}"`;
                const users = await apiRequest(CONFIG.TABLES.USER, filter);
                
                if (users.length > 0) {
                    currentUser = users[0].fields;
                    showDashboard();
                } else {
                    msg.innerText = '账号或密码错误';
                }
            } catch (error) {
                msg.innerText = '连接服务器失败，请稍后重试';
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('displayName').innerText = currentUser['客户名称'];
            refreshData();
        }

        async function refreshData() {
            try {
                const id = currentUser['客户ID'];
                // 查询余额
                const balances = await apiRequest(CONFIG.TABLES.BALANCE, `CurrentValue.[客户ID] == "${id}"`);
                if (balances.length > 0) {
                    const b = balances[0].fields;
                    document.getElementById('bal_huokuan').innerText = '¥' + (b['货款账户余额'] || 0).toLocaleString();
                    document.getElementById('bal_fanli').innerText = '¥' + (b['返利账户余额'] || 0).toLocaleString();
                }
            } catch (e) {
                console.error('获取余额失败', e);
            }
        }
    </script>

    <div id="loginSection" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm mx-4">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">经销商系统登录</h1>
            <input type="text" id="username" placeholder="请输入数字账号" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="password" placeholder="请输入密码" class="w-full p-3 border rounded-lg mb-6 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">登录</button>
            <p id="loginMsg" class="mt-4 text-center text-red-500 text-sm font-medium"></p>
        </div>
    </div>

    <div id="mainSection" class="hidden container mx-auto p-4 max-w-2xl pt-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-gray-800">您好，<span id="displayName" class="text-blue-600">--</span></h2>
            <button onclick="location.reload()" class="text-gray-400 text-sm border px-3 py-1 rounded">退出登录</button>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-600 p-6 rounded-2xl text-white shadow-lg">
                <p class="text-xs opacity-80 mb-1 font-medium">货款账户余额</p>
                <p class="text-2xl font-bold" id="bal_huokuan">¥0.00</p>
            </div>
            <div class="bg-emerald-600 p-6 rounded-2xl text-white shadow-lg">
                <p class="text-xs opacity-80 mb-1 font-medium">返利账户余额</p>
                <p class="text-2xl font-bold" id="bal_fanli">¥0.00</p>
            </div>
        </div>

        <div class="mt-8 p-4 bg-white rounded-xl border border-dashed border-gray-300">
            <p class="text-center text-gray-400 text-sm">暂无更多明细，系统已连接云端多维表格</p>
        </div>
    </div>
</body>
</html>
